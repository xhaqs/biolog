<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fauna — Field Species Log</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --ink:#1C2818;
  --paper:#DDD3B0;
  --card:#E8E0C8;
  --moss:#5C6B3F;
  --rust:#9C4A1E;
  --slate:#3E4A47;
  --amber:#C9962C;
  --border:rgba(28,40,24,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;
  min-height:100vh;
  padding-bottom:24px;
}
.display{font-family:'Fraunces',serif}
.mono{font-family:'IBM Plex Mono',monospace}

header{
  padding:20px 16px 14px;
  border-bottom:1px solid var(--border);
}
header .display{
  font-size:28px;
  font-weight:600;
  letter-spacing:-0.02em;
}
header .tag{
  font-size:11px;
  color:var(--slate);
  margin-top:2px;
  letter-spacing:0.04em;
  text-transform:uppercase;
}

.capture-hero{
  position:relative;
  margin:16px;
  border-radius:4px;
  overflow:hidden;
  background:var(--ink);
  aspect-ratio:4/3;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:1px solid var(--border);
}
.capture-hero video, .capture-hero img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.reticle{
  position:absolute;inset:0;
  pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.reticle-frame{
  width:62%;height:62%;
  border:1px solid rgba(221,211,176,0.55);
  position:relative;
}
.reticle-frame::before,.reticle-frame::after,
.reticle-corner-tl,.reticle-corner-br{content:''}
.corner{position:absolute;width:16px;height:16px;border-color:var(--paper);border-style:solid}
.corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.capture-label{
  position:absolute;bottom:12px;left:0;right:0;
  text-align:center;color:var(--paper);
  font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  font-family:'IBM Plex Mono',monospace;
}
.capture-placeholder{
  color:var(--paper);
  text-align:center;
  padding:20px;
}
.capture-placeholder .icon{font-size:40px;margin-bottom:8px}
.capture-placeholder .txt{font-size:12px;color:rgba(221,211,176,0.7);letter-spacing:0.04em}

.btn-row{
  display:flex;gap:10px;
  padding:0 16px;
  margin-bottom:16px;
}
.btn{
  flex:1;
  padding:11px;
  border-radius:3px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  text-align:center;
}
.btn-primary{
  background:var(--moss);
  color:var(--paper);
  border-color:var(--moss);
}

.section-label{
  padding:0 16px;
  font-size:11px;
  color:var(--slate);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin:20px 0 8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.specimen-card{
  margin:0 16px 12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:3px;
  overflow:hidden;
}
.specimen-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:10px 12px 8px;
  border-bottom:1px solid var(--border);
}
.specimen-catalog{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--slate);
  letter-spacing:0.03em;
}
.specimen-badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  padding:2px 6px;
  border-radius:2px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.badge-flora{background:rgba(92,107,63,0.18);color:var(--moss)}
.badge-fauna{background:rgba(156,74,30,0.18);color:var(--rust)}
.specimen-body{
  display:flex;
  gap:10px;
  padding:10px 12px;
}
.specimen-thumb{
  width:64px;height:64px;
  border-radius:3px;
  object-fit:cover;
  background:var(--ink);
  flex-shrink:0;
}
.specimen-info{flex:1;min-width:0}
.specimen-name{
  font-family:'Fraunces',serif;
  font-size:16px;
  font-weight:600;
  line-height:1.2;
}
.specimen-latin{
  font-style:italic;
  font-size:12px;
  color:var(--slate);
  margin-top:1px;
}
.specimen-desc{
  font-size:12px;
  color:var(--ink);
  margin-top:5px;
  line-height:1.4;
}
.specimen-footer{
  display:flex;
  justify-content:space-between;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--slate);
  padding:6px 12px 10px;
  border-top:1px solid var(--border);
}

.empty-state{
  margin:0 16px;
  padding:30px 16px;
  text-align:center;
  color:var(--slate);
  font-size:12px;
}

#mapView{
  display:none;
  margin:0 16px 16px;
  border-radius:4px;
  overflow:hidden;
  border:1px solid var(--border);
}
#specimenMap{height:320px;filter:sepia(15%) saturate(75%) brightness(95%);}
.leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--ink)!important;border-radius:3px!important;font-family:'IBM Plex Sans',sans-serif!important}
.leaflet-popup-tip{background:var(--card)!important}
@media print{
  body{background:#fff;color:#000}
  .capture-hero, .btn-row, .section-label button, #mapView, #toast{display:none!important}
  .specimen-card{break-inside:avoid;border:1px solid #999;margin-bottom:10px}
}
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:3px;font-size:13px;
  background:var(--ink);color:var(--paper);
  font-family:'IBM Plex Mono',monospace;
  display:none;z-index:9999;
}
</style>
</head>
<body>

<div id="expeditionBanner" style="display:none;background:var(--amber);color:var(--paper);font-size:11px;font-family:'IBM Plex Mono',monospace;padding:8px 14px;text-align:center;display:flex;justify-content:space-between;align-items:center;gap:8px">
  <span id="expeditionBannerText">📵 OFFLINE — 0 pending</span>
  <button id="expeditionSyncBtn" onclick="syncExpeditionQueue()" style="background:var(--ink);color:var(--paper);border:none;border-radius:3px;padding:5px 10px;font-size:10px;cursor:pointer;font-family:'IBM Plex Mono',monospace">🔄 SYNC NOW</button>
</div>

<header>
  <div class="display">🐾 Fauna</div>
  <div class="tag">Field Species Log — Identify · Log · Map</div>
</header>

<div class="capture-hero" id="captureHero" onclick="startCapture()">
  <div class="capture-placeholder" id="capturePlaceholder">
    <div class="icon">◎</div>
    <div class="txt">TAP TO IDENTIFY A SPECIMEN</div>
  </div>
  <img id="capturedImg" style="display:none">
  <div class="reticle" id="reticleOverlay" style="display:none">
    <div class="reticle-frame">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
  </div>
  <div class="capture-label" id="captureStatus" style="display:none"></div>
</div>

<div class="btn-row">
  <button class="btn btn-primary" onclick="startCapture()">📷 Capture</button>
  <button class="btn" onclick="document.getElementById('fileInput').click()">🖼 Upload</button>
</div>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(event)">

<div class="section-label">
  <span>Field Ledger</span>
  <span style="display:flex;gap:6px;align-items:center">
    <button onclick="toggleMapView()" style="font-size:11px;font-family:'IBM Plex Mono',monospace;background:var(--moss);color:var(--paper);border:none;border-radius:3px;padding:6px 10px;cursor:pointer;font-weight:600">🗺 MAP</button>
    <button onclick="exportCSV()" style="font-size:9px;font-family:'IBM Plex Mono',monospace;background:none;border:1px solid var(--border);border-radius:2px;padding:3px 6px;cursor:pointer;color:var(--slate)">CSV</button>
    <button onclick="exportPDF()" style="font-size:9px;font-family:'IBM Plex Mono',monospace;background:none;border:1px solid var(--border);border-radius:2px;padding:3px 6px;cursor:pointer;color:var(--slate)">PDF</button>
    <span id="ledgerCount" class="mono">0 entries</span>
  </span>
</div>
<div id="mapView">
  <div style="display:flex;gap:6px;padding:8px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap">
    <button id="territoryToggle" onclick="toggleTerritory()" style="font-size:9px;font-family:'IBM Plex Mono',monospace;background:none;border:1px solid var(--border);border-radius:2px;padding:4px 8px;cursor:pointer;color:var(--slate)">🗺 TERRITORY</button>
    <button id="replayToggle" onclick="startReplay()" style="font-size:9px;font-family:'IBM Plex Mono',monospace;background:none;border:1px solid var(--border);border-radius:2px;padding:4px 8px;cursor:pointer;color:var(--slate)">▶ REPLAY</button>
    <button id="rangeCheckToggle" onclick="toggleRangeCheck()" style="font-size:9px;font-family:'IBM Plex Mono',monospace;background:none;border:1px solid var(--border);border-radius:2px;padding:4px 8px;cursor:pointer;color:var(--slate)">🔬 RANGE CHECK</button>
  </div>
  <div id="specimenMap"></div>
</div>
<div id="ledgerList"></div>

<div id="toast"></div>

<script>
const DB = 'https://riakoine-fauna-default-rtdb.asia-southeast1.firebasedatabase.app';
let _sightings = [];
let _catalogSeq = parseInt(localStorage.getItem('fauna_catalog_seq')||'0');
let _showLocalNames = {};

function toast(msg, type='ok', dur=3000){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='err' ? '#9C4A1E' : '#1C2818';
  el.style.display = 'block';
  setTimeout(()=>el.style.display='none', dur);
}

window.onerror = function(msg, url, line, col){
  alert('JS ERROR: '+msg+' | line:'+line+' col:'+col);
  return false;
};

function startCapture(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = e => processImageFile(e.target.files[0]);
  input.click();
}

function handleFileUpload(e){
  processImageFile(e.target.files[0]);
}

function processImageFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    document.getElementById('capturePlaceholder').style.display = 'none';
    const img = document.getElementById('capturedImg');
    img.src = dataUrl;
    img.style.display = 'block';
    showTargetPrompt(dataUrl, img);
  };
  reader.readAsDataURL(file);
}

function showTargetPrompt(dataUrl, imgEl){
  const status = document.getElementById('captureStatus');
  status.style.display = 'block';
  status.textContent = '🎯 TAP THE SPECIMEN, OR USE FULL PHOTO';

  let fullBtn = document.getElementById('useFullPhotoBtn');
  if(!fullBtn){
    fullBtn = document.createElement('button');
    fullBtn.id = 'useFullPhotoBtn';
    fullBtn.textContent = 'Use Full Photo';
    fullBtn.style.cssText = 'position:absolute;bottom:36px;left:50%;transform:translateX(-50%);background:var(--moss);color:var(--paper);border:none;border-radius:3px;padding:8px 16px;font-size:11px;font-family:\'IBM Plex Sans\',sans-serif;cursor:pointer;z-index:5';
    document.getElementById('captureHero').appendChild(fullBtn);
  }
  fullBtn.style.display = 'block';
  fullBtn.onclick = (e) => {
    e.stopPropagation();
    fullBtn.style.display = 'none';
    proceedWithImage(dataUrl);
  };

  imgEl.style.cursor = 'crosshair';
  imgEl.onclick = (e) => {
    const rect = imgEl.getBoundingClientRect();
    const xRatio = (e.clientX - rect.left) / rect.width;
    const yRatio = (e.clientY - rect.top) / rect.height;
    fullBtn.style.display = 'none';
    cropAroundPoint(dataUrl, xRatio, yRatio);
  };
}

function cropAroundPoint(dataUrl, xRatio, yRatio){
  const status = document.getElementById('captureStatus');
  status.textContent = '🎯 TARGET LOCKED — CROPPING...';
  const tempImg = new Image();
  tempImg.onload = () => {
    const w = tempImg.width, h = tempImg.height;
    const cropSize = Math.min(w, h) * 0.6;
    let cx = xRatio * w, cy = yRatio * h;
    let sx = Math.max(0, Math.min(w - cropSize, cx - cropSize/2));
    let sy = Math.max(0, Math.min(h - cropSize, cy - cropSize/2));

    const canvas = document.createElement('canvas');
    canvas.width = cropSize;
    canvas.height = cropSize;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(tempImg, sx, sy, cropSize, cropSize, 0, 0, cropSize, cropSize);
    const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);

    const img = document.getElementById('capturedImg');
    img.src = croppedDataUrl;
    proceedWithImage(croppedDataUrl);
  };
  tempImg.src = dataUrl;
}

let _burstImages = [];

async function proceedWithImage(dataUrl){
  const img = document.getElementById('capturedImg');
  img.onclick = null;
  img.style.cursor = 'default';
  const fullBtn = document.getElementById('useFullPhotoBtn');
  if(fullBtn) fullBtn.style.display = 'none';

  _burstImages.push(dataUrl);
  showBurstPrompt();
}

function showBurstPrompt(){
  const status = document.getElementById('captureStatus');
  status.style.display = 'block';

  if(_burstImages.length >= 3){
    finishBurstAndIdentify();
    return;
  }

  status.innerHTML = '📸 Add another angle for better accuracy? ('+_burstImages.length+'/3)';

  let wrap = document.getElementById('burstBtnWrap');
  if(!wrap){
    wrap = document.createElement('div');
    wrap.id = 'burstBtnWrap';
    wrap.style.cssText = 'position:absolute;bottom:36px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:5';
    document.getElementById('captureHero').appendChild(wrap);
  }
  wrap.innerHTML = '';
  wrap.style.display = 'flex';

  const addBtn = document.createElement('button');
  addBtn.textContent = '+ Add Angle';
  addBtn.style.cssText = 'background:var(--card);color:var(--ink);border:1px solid var(--border);border-radius:3px;padding:10px 16px;font-size:12px;font-family:\'IBM Plex Sans\',sans-serif;cursor:pointer';
  addBtn.onclick = captureAnotherAngle;

  const doneBtn = document.createElement('button');
  doneBtn.textContent = '✓ Identify Now';
  doneBtn.style.cssText = 'background:var(--moss);color:var(--paper);border:none;border-radius:3px;padding:10px 16px;font-size:12px;font-family:\'IBM Plex Sans\',sans-serif;cursor:pointer';
  doneBtn.onclick = finishBurstAndIdentify;

  wrap.appendChild(addBtn);
  wrap.appendChild(doneBtn);
}

function captureAnotherAngle(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      _burstImages.push(ev.target.result);
      document.getElementById('capturedImg').src = ev.target.result;
      showBurstPrompt();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

const EXPED_DB_NAME = 'fauna_expedition';
const EXPED_STORE = 'pending';
let _isSyncing = false;

function openExpedDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(EXPED_DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains(EXPED_STORE)){
        db.createObjectStore(EXPED_STORE, {keyPath:'id', autoIncrement:true});
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function queueExpeditionItem(images, loc){
  const db = await openExpedDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(EXPED_STORE, 'readwrite');
    const store = tx.objectStore(EXPED_STORE);
    const item = {images, lat: loc?loc.lat:null, lng: loc?loc.lng:null, ts: Date.now()};
    const req = store.add(item);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function getQueuedItems(){
  const db = await openExpedDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(EXPED_STORE, 'readonly');
    const store = tx.objectStore(EXPED_STORE);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function removeQueuedItem(id){
  const db = await openExpedDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(EXPED_STORE, 'readwrite');
    const store = tx.objectStore(EXPED_STORE);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = e => reject(e.target.error);
  });
}

async function updateExpeditionBanner(){
  const banner = document.getElementById('expeditionBanner');
  const text = document.getElementById('expeditionBannerText');
  const syncBtn = document.getElementById('expeditionSyncBtn');
  const items = await getQueuedItems();

  if(!navigator.onLine){
    banner.style.display = 'flex';
    text.textContent = '📵 OFFLINE — '+items.length+' pending in expedition queue';
    syncBtn.style.display = 'none';
  } else if(items.length > 0){
    banner.style.display = 'flex';
    text.textContent = '📶 Online — '+items.length+' pending to sync';
    syncBtn.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
}

async function syncExpeditionQueue(){
  if(_isSyncing) return;
  if(!navigator.onLine){ toast('Still offline — will sync automatically once reconnected'); return; }

  _isSyncing = true;
  const items = await getQueuedItems();
  if(!items.length){ _isSyncing = false; updateExpeditionBanner(); return; }

  const text = document.getElementById('expeditionBannerText');
  const syncBtn = document.getElementById('expeditionSyncBtn');
  syncBtn.style.display = 'none';

  for(let i=0; i<items.length; i++){
    const item = items[i];
    text.textContent = '🔄 Syncing expedition: '+(i+1)+'/'+items.length+'...';
    try{
      const loc = (item.lat && item.lng) ? {lat:item.lat, lng:item.lng} : null;
      await identifySpecies(item.images, loc);
      await removeQueuedItem(item.id);
    }catch(e){
      // leave in queue, try again next sync
    }
  }

  _isSyncing = false;
  await updateExpeditionBanner();
  toast('✅ Expedition synced');
}

window.addEventListener('online', () => { updateExpeditionBanner(); syncExpeditionQueue(); });
window.addEventListener('offline', () => { updateExpeditionBanner(); });

async function finishBurstAndIdentify(){
  const wrap = document.getElementById('burstBtnWrap');
  if(wrap) wrap.style.display = 'none';

  const status = document.getElementById('captureStatus');
  status.textContent = 'GETTING LOCATION...';
  const loc = await getLocation();

  if(!navigator.onLine){
    await queueExpeditionItem(_burstImages.slice(), loc);
    _burstImages = [];
    status.style.display = 'none';
    await updateExpeditionBanner();
    toast('📵 Offline — specimen queued for expedition sync');
    resetCapture();
    return;
  }

  status.textContent = 'ANALYZING SPECIMEN'+(_burstImages.length>1?' ('+_burstImages.length+' ANGLES)':'')+'...';
  await identifySpecies(_burstImages.slice(), loc);
  _burstImages = [];
}

async function identifySpecies(images, loc){
  const status = document.getElementById('captureStatus');
  const imageArr = Array.isArray(images) ? images : [images];
  try{
    const payload = imageArr.map(img => ({
      image: img.split(',')[1],
      mediaType: img.split(';')[0].split(':')[1]
    }));
    const r = await fetch('/api/identify', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({images: payload, lat: loc?loc.lat:null, lng: loc?loc.lng:null})
    });
    const result = await r.json();
    if(!r.ok) throw new Error(result.error || ('Server error '+r.status));
    status.style.display = 'none';
    await saveSighting(imageArr[0], result, loc, imageArr.length);
  }catch(e){
    status.textContent = 'ID FAILED — TAP TO RETRY';
    toast('Identification failed: '+e.message, 'err', 5000);
  }
}

function getLocation(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({lat:pos.coords.latitude, lng:pos.coords.longitude}),
      () => resolve(null),
      {timeout:8000}
    );
  });
}

async function hashSighting(obj){
  const str = obj.catalogNo+'|'+obj.name+'|'+obj.latin+'|'+obj.ts+'|'+(obj.lat||'')+'|'+(obj.lng||'');
  const data = new TextEncoder().encode(str);
  const hashBuf = await crypto.subtle.digest('SHA-256', data);
  const hashArr = Array.from(new Uint8Array(hashBuf));
  return hashArr.map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

async function saveSighting(imageData, idResult, loc, angleCount){
  _catalogSeq++;
  localStorage.setItem('fauna_catalog_seq', _catalogSeq);
  const catalogNo = 'FN-'+String(_catalogSeq).padStart(4,'0');
  const localId = 'fn_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6);

  const sighting = {
    id: localId,
    catalogNo,
    anglesUsed: angleCount || 1,
    name: idResult.name || 'Unknown specimen',
    latin: idResult.latin || '',
    localName: idResult.local_name || '',
    localLanguage: idResult.local_language || '',
    kingdom: idResult.kingdom || 'fauna',
    description: idResult.description || '',
    confidence: idResult.confidence || '',
    photo: imageData,
    lat: loc ? loc.lat : null,
    lng: loc ? loc.lng : null,
    ts: Date.now()
  };
  sighting.verifyHash = await hashSighting(sighting);

  _sightings.unshift(sighting);
  renderLedger();
  toast('🐾 Specimen logged: '+catalogNo);

  try{
    const r = await fetch('/api/sightings', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(sighting)
    });
    const data = await r.json();
    if(data && data.name){
      sighting.fbKey = data.name;
    }
  }catch(e){
    toast('Saved locally, sync failed','err');
  }

  saveLedgerLocal();
  resetCapture();
}

function saveLedgerLocal(){
  try{
    localStorage.setItem('fauna_sightings', JSON.stringify(_sightings.slice(0,100)));
  }catch(e){
    try{
      const lean = _sightings.slice(0,30).map(s=>({...s, photo: s.photo ? s.photo.slice(0,200)+'...(cached)' : ''}));
      localStorage.setItem('fauna_sightings', JSON.stringify(lean));
    }catch(e2){
      localStorage.removeItem('fauna_sightings');
    }
  }
}

function deleteSighting(id){
  if(!confirm('Delete this specimen record? This cannot be undone.')) return;
  _sightings = _sightings.filter(s=>s.id!==id);
  saveLedgerLocal();
  renderLedger();
  toast('🗑️ Record deleted');
}

function shareSighting(id){
  const s = _sightings.find(x=>x.id===id);
  if(!s) return;
  const url = window.location.origin + window.location.pathname + '?sighting=' + s.id;
  const text = '🐾 Field Sighting: '+s.name+(s.latin?' ('+s.latin+')':'')+'\n'+s.catalogNo+' — '+formatTime(s.ts)+'\nVerify: '+s.verifyHash+'\n\n'+url;
  if(navigator.share){
    navigator.share({title:s.name, text:text, url:url}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>toast('📋 Copied to clipboard')).catch(()=>toast('Could not copy','err'));
  }
}

function generateDiscoveryCard(id){
  const s = _sightings.find(x=>x.id===id);
  if(!s) return;

  toast('🎨 Composing Discovery Card...');

  const canvas = document.createElement('canvas');
  const W = 1080, H = 1350;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    // Background paper
    ctx.fillStyle = '#DDD3B0';
    ctx.fillRect(0, 0, W, H);

    // Outer frame border
    ctx.strokeStyle = '#1C2818';
    ctx.lineWidth = 6;
    ctx.strokeRect(24, 24, W-48, H-48);
    ctx.lineWidth = 1;
    ctx.strokeRect(38, 38, W-76, H-76);

    // Photo area (top ~62%)
    const photoTop = 60, photoH = 780, photoW = W-120, photoLeft = 60;
    const imgRatio = img.width/img.height;
    const boxRatio = photoW/photoH;
    let sx=0, sy=0, sw=img.width, sh=img.height;
    if(imgRatio > boxRatio){
      sw = img.height * boxRatio;
      sx = (img.width - sw)/2;
    } else {
      sh = img.width / boxRatio;
      sy = (img.height - sh)/2;
    }
    ctx.save();
    ctx.beginPath();
    ctx.rect(photoLeft, photoTop, photoW, photoH);
    ctx.clip();
    ctx.drawImage(img, sx, sy, sw, sh, photoLeft, photoTop, photoW, photoH);
    ctx.restore();
    ctx.strokeStyle = '#1C2818';
    ctx.lineWidth = 3;
    ctx.strokeRect(photoLeft, photoTop, photoW, photoH);

    // Catalog badge (top-left corner over photo)
    ctx.fillStyle = 'rgba(28,40,24,0.85)';
    ctx.fillRect(photoLeft+16, photoTop+16, 210, 44);
    ctx.fillStyle = '#DDD3B0';
    ctx.font = '22px "IBM Plex Mono", monospace';
    ctx.fillText(s.catalogNo, photoLeft+30, photoTop+45);

    // Kingdom badge (top-right over photo)
    const kingdomColor = s.kingdom==='flora' ? '#5C6B3F' : '#9C4A1E';
    ctx.fillStyle = kingdomColor;
    ctx.fillRect(photoLeft+photoW-160, photoTop+16, 145, 44);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px "IBM Plex Mono", monospace';
    ctx.fillText((s.kingdom||'fauna').toUpperCase(), photoLeft+photoW-148, photoTop+45);

    // Species name
    ctx.fillStyle = '#1C2818';
    ctx.font = 'bold 56px Georgia, serif';
    wrapText(ctx, s.name, 60, 900, W-120, 60);

    // Latin name
    if(s.latin){
      ctx.font = 'italic 32px Georgia, serif';
      ctx.fillStyle = '#3E4A47';
      ctx.fillText(s.latin, 60, 975);
    }

    // Local name if available
    let yPos = 1020;
    if(s.localName){
      ctx.font = '26px Georgia, serif';
      ctx.fillStyle = '#5C6B3F';
      ctx.fillText(s.localName + (s.localLanguage ? ' ('+s.localLanguage+')' : ''), 60, yPos);
      yPos += 40;
    }

    // Description
    if(s.description){
      ctx.font = '22px sans-serif';
      ctx.fillStyle = '#1C2818';
      wrapText(ctx, s.description, 60, yPos+30, W-120, 30, 3);
    }

    // Footer branding
    ctx.font = '20px "IBM Plex Mono", monospace';
    ctx.fillStyle = '#3E4A47';
    ctx.fillText('🐾 FAUNA · Field Species Log', 60, H-70);
    ctx.textAlign = 'right';
    ctx.fillText(new Date(s.ts).toLocaleDateString(), W-60, H-70);
    ctx.textAlign = 'left';

    canvas.toBlob(async (blob) => {
      const file = new File([blob], s.catalogNo+'_discovery_card.png', {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file], title:s.name, text:'Discovered with Fauna 🐾'}).catch(()=>{});
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = s.catalogNo+'_discovery_card.png';
        a.click();
        URL.revokeObjectURL(url);
      }
      toast('🎨 Discovery Card ready!');
    }, 'image/png');
  };
  img.onerror = () => toast('Could not load photo for card','err');
  img.src = s.photo;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for(let i=0; i<words.length; i++){
    const testLine = line + words[i] + ' ';
    if(ctx.measureText(testLine).width > maxWidth && i > 0){
      lines.push(line);
      line = words[i] + ' ';
    } else {
      line = testLine;
    }
  }
  lines.push(line);
  if(maxLines) lines = lines.slice(0, maxLines);
  lines.forEach((l, idx) => ctx.fillText(l.trim(), x, y + idx*lineHeight));
}

function showSightingQR(id){
  const s = _sightings.find(x=>x.id===id);
  if(!s) return;
  const url = window.location.origin + window.location.pathname + '?sighting=' + s.id;
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(url);
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = '<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;text-align:center;max-width:300px;font-family:\'IBM Plex Sans\',sans-serif">'
    +'<div class="display" style="font-size:16px;font-weight:600;margin-bottom:4px">'+s.name+'</div>'
    +'<div class="mono" style="font-size:10px;color:var(--slate);margin-bottom:10px">'+s.catalogNo+'</div>'
    +'<img src="'+qrUrl+'" style="width:180px;height:180px;border-radius:4px;background:#fff;padding:6px">'
    +'<div class="mono" style="font-size:9px;color:var(--slate);margin-top:10px">VERIFY: '+s.verifyHash+'</div>'
    +'<button onclick="this.parentElement.parentElement.remove()" style="margin-top:14px;background:var(--moss);color:var(--paper);border:none;border-radius:3px;padding:10px 20px;cursor:pointer;width:100%;font-family:\'IBM Plex Sans\',sans-serif">Close</button>'
    +'</div>';
  document.body.appendChild(modal);
}

function resetCapture(){
  setTimeout(()=>{
    document.getElementById('capturePlaceholder').style.display = 'block';
    document.getElementById('capturedImg').style.display = 'none';
    document.getElementById('captureStatus').style.display = 'none';
  }, 1500);
}

function formatTime(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function renderLedger(){
  const el = document.getElementById('ledgerList');
  document.getElementById('ledgerCount').textContent = _sightings.length+' entries';

  if(!_sightings.length){
    el.innerHTML = '<div class="empty-state">No specimens logged yet.<br>Tap the viewfinder above to identify your first sighting.</div>';
    return;
  }

  el.innerHTML = _sightings.map((s,idx)=>
    '<div class="specimen-card">'
    +'<div class="specimen-header">'
      +'<span class="specimen-catalog">'+s.catalogNo+'</span>'
      +'<span class="specimen-badge badge-'+(s.kingdom==='flora'?'flora':'fauna')+'">'+(s.kingdom||'fauna')+'</span>'
    +'</div>'
    +'<div class="specimen-body">'
      +'<img class="specimen-thumb" src="'+s.photo+'">'
      +'<div class="specimen-info">'
        +'<div class="specimen-name">'+(_showLocalNames[idx] && s.localName ? s.localName : s.name)+'</div>'
      +(s.latin?'<div class="specimen-latin">'+s.latin+'</div>':'')
      +(s.localName?'<button onclick="toggleLocalName('+idx+')" style="font-size:9px;font-family:\'IBM Plex Mono\',monospace;background:none;border:1px solid var(--border);border-radius:2px;padding:1px 6px;margin-top:3px;cursor:pointer;color:var(--slate)">'+(_showLocalNames[idx]?'EN':(s.localLanguage||'LOCAL').toUpperCase().slice(0,3))+' ⇄</button>':'')
      +'<div class="specimen-desc">'+(s.description||'').slice(0,90)+((s.description||'').length>90?'…':'')+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="specimen-footer">'
      +'<span>'+formatTime(s.ts)+'</span>'
      +'<span>'+(s.lat?s.lat.toFixed(4)+', '+s.lng.toFixed(4):'no gps')+'</span>'
    +'</div>'
    +'<div style="display:flex;gap:4px;padding:0 12px 10px">'
      +'<button onclick="generateDiscoveryCard(\''+s.id+'\')" style="flex:1;font-size:9px;font-family:\'IBM Plex Mono\',monospace;background:var(--moss);color:var(--paper);border:none;border-radius:2px;padding:5px;cursor:pointer">CARD</button>'
      +'<button onclick="shareSighting(\''+s.id+'\')" style="flex:1;font-size:9px;font-family:\'IBM Plex Mono\',monospace;background:none;border:1px solid var(--border);border-radius:2px;padding:5px;cursor:pointer;color:var(--slate)">SHARE</button>'
      +'<button onclick="showSightingQR(\''+s.id+'\')" style="flex:1;font-size:9px;font-family:\'IBM Plex Mono\',monospace;background:none;border:1px solid var(--border);border-radius:2px;padding:5px;cursor:pointer;color:var(--slate)">QR</button>'
      +'<button onclick="deleteSighting(\''+s.id+'\')" style="flex:1;font-size:9px;font-family:\'IBM Plex Mono\',monospace;background:none;border:1px solid var(--rust);border-radius:2px;padding:5px;cursor:pointer;color:var(--rust)">DELETE</button>'
    +'</div>'
    +'</div>'
  ).join('');
}

let _mapInstance = null;
let _mapVisible = false;
let _territoryVisible = false;
let _territoryLayers = [];
let _replayActive = false;
let _replayTimer = null;
let _rangeCheckVisible = false;
let _rangeCache = {};

function exportCSV(){
  if(!_sightings.length){ toast('No sightings to export','err'); return; }
  const headers = ['Catalog No','Name','Latin Name','Local Name','Local Language','Kingdom','Description','Confidence','Latitude','Longitude','Timestamp','Verify Hash'];
  const rows = _sightings.map(s=>[
    s.catalogNo, s.name, s.latin, s.localName, s.localLanguage, s.kingdom,
    '"'+(s.description||'').replace(/"/g,'""')+'"',
    s.confidence, s.lat||'', s.lng||'', new Date(s.ts).toISOString(), s.verifyHash||''
  ]);
  const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fauna-field-log-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('📄 CSV exported');
}

function exportPDF(){
  if(!_sightings.length){ toast('No sightings to export','err'); return; }
  toast('Opening print dialog — choose "Save as PDF"');
  setTimeout(()=>window.print(), 300);
}

function toggleMapView(){
  _mapVisible = !_mapVisible;
  const mapEl = document.getElementById('mapView');
  const listEl = document.getElementById('ledgerList');
  if(_mapVisible){
    mapEl.style.display = 'block';
    listEl.style.display = 'none';
    renderMap();
  } else {
    mapEl.style.display = 'none';
    listEl.style.display = 'block';
  }
}

function renderMap(){
  const withGps = _sightings.filter(s=>s.lat && s.lng);
  if(!_mapInstance){
    _mapInstance = L.map('specimenMap', {zoomControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '© OpenStreetMap'
    }).addTo(_mapInstance);
  }

  _mapInstance.eachLayer(layer=>{
    if(layer instanceof L.Marker) _mapInstance.removeLayer(layer);
  });

  if(!withGps.length){
    _mapInstance.setView([0,0], 2);
    return;
  }

  const bounds = [];
  withGps.forEach(s=>{
    const color = s.kingdom==='flora' ? '#5C6B3F' : '#9C4A1E';
    const icon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;border-radius:50%;background:'+color+';border:2px solid #DDD3B0;box-shadow:0 0 0 1px '+color+'"></div>',
      iconSize: [14,14]
    });
    const marker = L.marker([s.lat, s.lng], {icon}).addTo(_mapInstance);
    marker.bindPopup('<b>'+s.name+'</b><br><i>'+(s.latin||'')+'</i><br><span style="font-family:monospace;font-size:10px">'+s.catalogNo+'</span>');
    bounds.push([s.lat, s.lng]);
  });

  if(bounds.length === 1){
    _mapInstance.setView(bounds[0], 13);
  } else {
    _mapInstance.fitBounds(bounds, {padding:[30,30]});
  }
}

function toggleTerritory(){
  _territoryVisible = !_territoryVisible;
  const btn = document.getElementById('territoryToggle');
  if(btn) btn.style.background = _territoryVisible ? 'var(--moss)' : 'none';
  if(btn) btn.style.color = _territoryVisible ? 'var(--paper)' : 'var(--slate)';

  _territoryLayers.forEach(layer=>_mapInstance.removeLayer(layer));
  _territoryLayers = [];

  if(_territoryVisible){
    _sightings.filter(s=>s.lat && s.lng).forEach(s=>{
      const circle = L.circle([s.lat, s.lng], {
        radius: 500,
        color: s.kingdom==='flora' ? '#5C6B3F' : '#9C4A1E',
        fillColor: s.kingdom==='flora' ? '#5C6B3F' : '#9C4A1E',
        fillOpacity: 0.08,
        weight: 1,
        opacity: 0.3
      }).addTo(_mapInstance);
      _territoryLayers.push(circle);
    });
  }
}

function startReplay(){
  if(_replayActive){
    clearInterval(_replayTimer);
    _replayActive = false;
    const btn = document.getElementById('replayToggle');
    if(btn){ btn.textContent = '▶ REPLAY'; btn.style.background = 'none'; btn.style.color = 'var(--slate)'; }
    renderMap();
    return;
  }

  const withGps = _sightings.filter(s=>s.lat && s.lng).sort((a,b)=>a.ts-b.ts);
  if(withGps.length < 2){ toast('Need at least 2 GPS sightings to replay','err'); return; }

  _mapInstance.eachLayer(layer=>{
    if(layer instanceof L.Marker || layer instanceof L.Polyline) _mapInstance.removeLayer(layer);
  });

  _replayActive = true;
  const btn = document.getElementById('replayToggle');
  if(btn){ btn.textContent = '⏸ STOP'; btn.style.background = 'var(--rust)'; btn.style.color = 'var(--paper)'; }

  let i = 0;
  const trail = [];
  const trailLine = L.polyline([], {color:'#9C4A1E', weight:2, opacity:0.6, dashArray:'4,4'}).addTo(_mapInstance);

  _replayTimer = setInterval(()=>{
    if(i >= withGps.length){
      clearInterval(_replayTimer);
      _replayActive = false;
      if(btn){ btn.textContent = '▶ REPLAY'; btn.style.background = 'none'; btn.style.color = 'var(--slate)'; }
      return;
    }
    const s = withGps[i];
    const color = s.kingdom==='flora' ? '#5C6B3F' : '#9C4A1E';
    const icon = L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;border-radius:50%;background:'+color+';border:2px solid #DDD3B0;box-shadow:0 0 8px '+color+'"></div>',
      iconSize: [16,16]
    });
    const marker = L.marker([s.lat, s.lng], {icon}).addTo(_mapInstance);
    marker.bindPopup('<b>'+s.name+'</b><br>'+formatTime(s.ts));
    marker.openPopup();
    trail.push([s.lat, s.lng]);
    trailLine.setLatLngs(trail);
    _mapInstance.panTo([s.lat, s.lng]);
    i++;
  }, 1200);
}

async function toggleRangeCheck(){
  _rangeCheckVisible = !_rangeCheckVisible;
  const btn = document.getElementById('rangeCheckToggle');
  if(btn) btn.style.background = _rangeCheckVisible ? 'var(--moss)' : 'none';
  if(btn) btn.style.color = _rangeCheckVisible ? 'var(--paper)' : 'var(--slate)';

  if(!_rangeCheckVisible) return;

  const withGps = _sightings.filter(s=>s.lat && s.lng && s.latin);
  if(!withGps.length){ toast('No sightings with species data to check','err'); return; }

  toast('🔬 Checking against scientific range data...');
  for(const s of withGps){
    const key = s.latin+'_'+s.lat.toFixed(2)+'_'+s.lng.toFixed(2);
    if(_rangeCache[key] === undefined){
      try{
        const r = await fetch('/api/rangecheck?species='+encodeURIComponent(s.latin)+'&lat='+s.lat+'&lng='+s.lng);
        const data = await r.json();
        _rangeCache[key] = data.notable || false;
      }catch(e){
        _rangeCache[key] = false;
      }
    }
    if(_rangeCache[key]){
      L.marker([s.lat, s.lng], {
        icon: L.divIcon({className:'', html:'<div style="font-size:16px">🔬</div>', iconSize:[20,20], iconAnchor:[10,25]})
      }).addTo(_mapInstance).bindPopup('<b>Notable sighting!</b><br>'+s.name+' found outside its typical documented range.');
    }
  }
  toast('🔬 Range check complete');
}

function toggleLocalName(idx){
  _showLocalNames[idx] = !_showLocalNames[idx];
  renderLedger();
}

window.onload = function(){
  const saved = JSON.parse(localStorage.getItem('fauna_sightings')||'[]');
  _sightings = saved;
  renderLedger();
  updateExpeditionBanner();
  if(navigator.onLine) syncExpeditionQueue();
};

window.addEventListener('beforeunload', ()=>{
  localStorage.setItem('fauna_sightings', JSON.stringify(_sightings.slice(0,100)));
});
</script>
